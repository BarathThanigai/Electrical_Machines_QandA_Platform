{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>AskVoltieAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/custom.css' %}" rel="stylesheet" />
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-light px-0 py-3">
    <div class="container">
      <a class="navbar-brand" href="{% url 'dashboard' %}">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="AI Avatar" class="logo" style="width: 34px; height: 34px;">
        AskVoltieAI
      </a>
      <div class="d-flex gap-2 align-items-center ms-auto">
        <button id="theme-toggle" class="btn btn-outline-primary btn-sm theme-toggle-btn" type="button">Light Mode</button>
        <ul class="navbar-nav flex-row gap-2 align-items-center mb-0">
          {% if user.is_authenticated %}
          <li class="nav-item"><span class="nav-link">Hi, {{ user.username }}</span></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
          {% else %}
          <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'register' %}">Register</a></li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="container app-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'js/theme.js' %}"></script>
  <script src="{% static 'js/ajax.js' %}"></script>
</body>

</html>
